# Deploy ASP.NET Core app to MonsterASP via FTP
# Requires the following GitHub Secrets to be configured:
#   FTP_SERVER         - Your MonsterASP FTP hostname (e.g. ftp.yourdomain.com)
#   FTP_USERNAME       - Your MonsterASP FTP username
#   FTP_PASSWORD       - Your MonsterASP FTP password
#   CONNECTION_STRING  - Full database connection string

name: Deploy to MonsterASP

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore src/ECommerce.Web/ECommerce.Web.csproj

    - name: Inject connection string into appsettings.json
      run: |
        jq --arg cs "${{ secrets.CONNECTION_STRING }}" \
          '.ConnectionStrings.DefaultConnection = $cs' \
          src/ECommerce.Web/appsettings.json > tmp.json && \
          mv tmp.json src/ECommerce.Web/appsettings.json

    - name: Publish
      run: dotnet publish src/ECommerce.Web/ECommerce.Web.csproj --configuration Release --output ./publish

    - name: Create app_offline.htm to stop IIS and release file locks
      run: |
        cat > ./app_offline.htm << 'EOF'
        <!DOCTYPE html>
        <html><head><title>Updating...</title></head>
        <body><p>The application is being updated. Please try again in a moment.</p></body>
        </html>
        EOF

    - name: Upload app_offline.htm via FTP
      run: |
        curl --silent --show-error --fail \
          --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
          --upload-file ./app_offline.htm \
          "ftp://${{ secrets.FTP_SERVER }}/wwwroot/app_offline.htm"

    - name: Wait for IIS to release file locks
      run: |
        echo "Waiting for app to go offline..."
        for i in {1..15}; do
          if curl --silent --fail --max-time 5 "${{ secrets.SITE_URL }}" | grep -q "being updated"; then
            echo "App is offline after ${i} attempt(s). Proceeding."
            break
          fi
          echo "Attempt $i/15: app not offline yet, retrying in 3s..."
          sleep 3
        done

    - name: Deploy to MonsterASP via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: /wwwroot/
        exclude: |
          **/.git*
          **/.git*/**
          **/app_offline.htm

    - name: Remove app_offline.htm to bring app back online
      if: always()
      run: |
        curl --silent --show-error \
          --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
          "ftp://${{ secrets.FTP_SERVER }}/" \
          --quote "DELE /wwwroot/app_offline.htm"
